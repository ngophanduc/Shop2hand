server {
    listen 80;
    server_name passgiay.shop www.passgiay.shop;
    client_max_body_size 20M;

    # Certbot challenge location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS (except Certbot)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name passgiay.shop www.passgiay.shop;
    client_max_body_size 20M;

    # SSL Certificates (Real Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/passgiay.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/passgiay.shop/privkey.pem;

    # Optional: SSL optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy to backend
    location /api {
        proxy_pass http://backend:8080/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
